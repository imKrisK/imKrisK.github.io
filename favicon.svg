<!DOCTYPE html>
<html>
<head>
    <title>Favicon Generator</title>
</head>
<body>
    <svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <!-- Background circle -->
        <circle cx="16" cy="16" r="16" fill="#2563eb"/>
        
        <!-- Letter "K" in modern style -->
        <g fill="white">
            <!-- Left vertical line of K -->
            <rect x="8" y="6" width="3" height="20"/>
            
            <!-- Upper diagonal line -->
            <polygon points="11,6 14,6 20,12 17,12"/>
            
            <!-- Lower diagonal line -->
            <polygon points="14,20 17,20 23,26 20,26 11,17 11,20"/>
            
            <!-- Middle connection -->
            <rect x="11" y="14" width="6" height="3"/>
        </g>
        
        <!-- Highlight dot -->
        <circle cx="24" cy="8" r="2" fill="#f59e0b"/>
    </svg>
</body>
</html>