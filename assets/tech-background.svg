<!-- Tech Circuit Background SVG -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <!-- Circuit Board Pattern -->
    <pattern id="circuitBoard" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Circuit lines -->
      <path d="M20,50 L80,50 M50,20 L50,80" stroke="rgba(59,130,246,0.3)" stroke-width="2" fill="none"/>
      <path d="M10,30 L40,30 L40,70 L90,70" stroke="rgba(34,197,94,0.25)" stroke-width="1.5" fill="none"/>
      <!-- Circuit nodes -->
      <circle cx="20" cy="50" r="3" fill="rgba(59,130,246,0.5)"/>
      <circle cx="80" cy="50" r="3" fill="rgba(34,197,94,0.5)"/>
      <circle cx="50" cy="20" r="2" fill="rgba(147,51,234,0.4)"/>
      <circle cx="50" cy="80" r="2" fill="rgba(245,158,11,0.4)"/>
      <!-- Micro components -->
      <rect x="35" y="45" width="10" height="10" fill="rgba(59,130,246,0.2)" rx="1"/>
      <rect x="55" y="35" width="8" height="8" fill="rgba(34,197,94,0.2)" rx="1"/>
    </pattern>
    
    <!-- Code Matrix Pattern -->
    <pattern id="codeMatrix" x="0" y="0" width="80" height="120" patternUnits="userSpaceOnUse">
      <text x="10" y="20" font-family="'Fira Code', monospace" font-size="12" fill="rgba(34,197,94,0.3)">01</text>
      <text x="40" y="35" font-family="'Fira Code', monospace" font-size="10" fill="rgba(59,130,246,0.25)">if</text>
      <text x="15" y="50" font-family="'Fira Code', monospace" font-size="11" fill="rgba(147,51,234,0.3)">&lt;/&gt;</text>
      <text x="45" y="65" font-family="'Fira Code', monospace" font-size="9" fill="rgba(245,158,11,0.3)">fn</text>
      <text x="20" y="80" font-family="'Fira Code', monospace" font-size="12" fill="rgba(34,197,94,0.2)">10</text>
      <text x="50" y="95" font-family="'Fira Code', monospace" font-size="10" fill="rgba(59,130,246,0.2)">=&gt;</text>
      <text x="25" y="110" font-family="'Fira Code', monospace" font-size="11" fill="rgba(147,51,234,0.25)">{}</text>
    </pattern>
    
    <!-- Animated gradient -->
    <linearGradient id="techGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(15,23,42,0.95);stop-opacity:1">
        <animate attributeName="stop-color" values="rgba(15,23,42,0.95);rgba(30,41,59,0.9);rgba(15,23,42,0.95)" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:rgba(30,41,59,0.8);stop-opacity:1">
        <animate attributeName="stop-color" values="rgba(30,41,59,0.8);rgba(51,65,85,0.7);rgba(30,41,59,0.8)" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:rgba(51,65,85,0.85);stop-opacity:1">
        <animate attributeName="stop-color" values="rgba(51,65,85,0.85);rgba(71,85,105,0.8);rgba(51,65,85,0.85)" dur="12s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  
  <!-- Base layer -->
  <rect width="100%" height="100%" fill="url(#techGradient)"/>
  
  <!-- Circuit board pattern overlay -->
  <rect width="100%" height="100%" fill="url(#circuitBoard)" opacity="0.6"/>
  
  <!-- Code matrix overlay -->
  <rect width="100%" height="100%" fill="url(#codeMatrix)" opacity="0.4"/>
  
  <!-- Floating geometric shapes -->
  <g opacity="0.3">
    <polygon points="100,150 130,120 160,150 130,180" fill="rgba(59,130,246,0.4)">
      <animateTransform attributeName="transform" type="rotate" values="0 130 150;360 130 150" dur="20s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="900,300 930,270 960,300 930,330" fill="rgba(34,197,94,0.3)">
      <animateTransform attributeName="transform" type="rotate" values="0 930 300;-360 930 300" dur="25s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="200,600 240,560 280,600 240,640" fill="rgba(147,51,234,0.35)">
      <animateTransform attributeName="transform" type="rotate" values="0 240 600;360 240 600" dur="18s" repeatCount="indefinite"/>
    </polygon>
    <polygon points="1000,100 1040,60 1080,100 1040,140" fill="rgba(245,158,11,0.3)">
      <animateTransform attributeName="transform" type="rotate" values="0 1040 100;-360 1040 100" dur="22s" repeatCount="indefinite"/>
    </polygon>
  </g>
  
  <!-- Pulsing nodes -->
  <g>
    <circle cx="300" cy="200" r="4" fill="rgba(59,130,246,0.6)">
      <animate attributeName="r" values="4;8;4" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="500" r="3" fill="rgba(34,197,94,0.7)">
      <animate attributeName="r" values="3;7;3" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="500" cy="700" r="5" fill="rgba(147,51,234,0.5)">
      <animate attributeName="r" values="5;9;5" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>