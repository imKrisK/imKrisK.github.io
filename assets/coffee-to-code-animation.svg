<!-- Coffee to Code Transformation Animation -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" class="coffee-to-code-animation">
  <defs>
    <!-- Gradient for coffee -->
    <linearGradient id="coffeeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B4513;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A2C17;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gradient for steam/data flow -->
    <linearGradient id="steamGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(59,130,246,0.1);stop-opacity:0" />
      <stop offset="50%" style="stop-color:rgba(59,130,246,0.6);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(59,130,246,0.3);stop-opacity:0" />
    </linearGradient>
    
    <!-- Glow effect for code elements -->
    <filter id="codeGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Coffee Cup -->
  <g class="coffee-cup" transform="translate(50,150)">
    <!-- Cup body -->
    <path d="M20 40 L20 80 Q20 90 30 90 L70 90 Q80 90 80 80 L80 40 Z" 
          fill="rgba(248,250,252,0.9)" 
          stroke="rgba(148,163,184,0.6)" 
          stroke-width="2">
      <animate attributeName="opacity" values="1;0.3;1" dur="6s" repeatCount="indefinite"/>
    </path>
    
    <!-- Handle -->
    <path d="M80 50 Q95 50 95 65 Q95 80 80 80" 
          fill="none" 
          stroke="rgba(148,163,184,0.6)" 
          stroke-width="2">
      <animate attributeName="opacity" values="1;0.3;1" dur="6s" repeatCount="indefinite"/>
    </path>
    
    <!-- Coffee liquid -->
    <path d="M25 45 L25 75 Q25 85 30 85 L65 85 Q75 85 75 75 L75 45 Z" 
          fill="url(#coffeeGradient)">
      <animate attributeName="opacity" values="1;0.7;1" dur="4s" repeatCount="indefinite"/>
    </path>
    
    <!-- Coffee surface ripples -->
    <ellipse cx="50" cy="45" rx="20" ry="3" 
             fill="rgba(139,69,19,0.3)" 
             opacity="0">
      <animate attributeName="opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="rx" values="20;25;20" dur="3s" repeatCount="indefinite"/>
    </ellipse>
  </g>
  
  <!-- Steam transforming to code -->
  <g class="steam-to-code" opacity="0.8">
    <!-- Steam particles that become data -->
    <circle cx="100" cy="130" r="2" fill="url(#steamGradient)">
      <animate attributeName="cy" values="130;80;30" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;1;0" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2;4;1" dur="4s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="95" cy="125" r="1.5" fill="url(#steamGradient)">
      <animate attributeName="cy" values="125;75;25" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;1;0" dur="5s" repeatCount="indefinite"/>
    </circle>
    
    <circle cx="105" cy="135" r="2.5" fill="url(#steamGradient)">
      <animate attributeName="cy" values="135;85;35" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Code Elements Emerging -->
  <g class="code-elements" transform="translate(150,50)">
    <!-- Opening bracket -->
    <text x="0" y="20" 
          font-family="'Fira Code', monospace" 
          font-size="24" 
          fill="rgba(59,130,246,0.9)" 
          filter="url(#codeGlow)"
          opacity="0">
      {
      <animate attributeName="opacity" values="0;1;0.8" dur="2s" begin="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" 
                        type="scale" 
                        values="0.5;1.2;1" 
                        dur="2s" 
                        begin="2s" 
                        repeatCount="indefinite"/>
    </text>
    
    <!-- Code content using skills-visualization colors -->
    <text x="20" y="45" 
          font-family="'Fira Code', monospace" 
          font-size="14" 
          fill="rgba(34,197,94,0.9)"
          opacity="0">
      passion: 'code'
      <animate attributeName="opacity" values="0;1;0.9" dur="2s" begin="3s" repeatCount="indefinite"/>
    </text>
    
    <text x="20" y="65" 
          font-family="'Fira Code', monospace" 
          font-size="14" 
          fill="rgba(147,51,234,0.9)"
          opacity="0">
      fuel: 'coffee'
      <animate attributeName="opacity" values="0;1;0.9" dur="2s" begin="4s" repeatCount="indefinite"/>
    </text>
    
    <text x="20" y="85" 
          font-family="'Fira Code', monospace" 
          font-size="14" 
          fill="rgba(59,130,246,0.9)"
          opacity="0">
      output: 'magic'
      <animate attributeName="opacity" values="0;1;0.9" dur="2s" begin="5s" repeatCount="indefinite"/>
    </text>
    
    <!-- Closing bracket -->
    <text x="0" y="105" 
          font-family="'Fira Code', monospace" 
          font-size="24" 
          fill="rgba(59,130,246,0.9)" 
          filter="url(#codeGlow)"
          opacity="0">
      }
      <animate attributeName="opacity" values="0;1;0.8" dur="2s" begin="6s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" 
                        type="scale" 
                        values="0.5;1.2;1" 
                        dur="2s" 
                        begin="6s" 
                        repeatCount="indefinite"/>
    </text>
  </g>
  
  <!-- Data flow lines connecting coffee to code -->
  <g class="data-flow" opacity="0.6">
    <path d="M130 140 Q180 120 200 80" 
          stroke="url(#steamGradient)" 
          stroke-width="2" 
          fill="none"
          stroke-dasharray="5,5">
      <animate attributeName="stroke-dashoffset" values="0;-10" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite"/>
    </path>
    
    <path d="M135 135 Q185 115 205 75" 
          stroke="url(#steamGradient)" 
          stroke-width="1.5" 
          fill="none"
          stroke-dasharray="3,3">
      <animate attributeName="stroke-dashoffset" values="0;-6" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>
  
  <!-- Floating code particles -->
  <g class="code-particles">
    <text x="250" y="40" 
          font-family="'Fira Code', monospace" 
          font-size="12" 
          fill="rgba(59,130,246,0.4)"
          opacity="0">
      &lt;/&gt;
      <animate attributeName="opacity" values="0;0.6;0" dur="3s" begin="1s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" 
                        type="translate" 
                        values="0,0;10,-10;0,0" 
                        dur="6s" 
                        repeatCount="indefinite"/>
    </text>
    
    <text x="320" y="80" 
          font-family="'Fira Code', monospace" 
          font-size="10" 
          fill="rgba(34,197,94,0.4)"
          opacity="0">
      ()
      <animate attributeName="opacity" values="0;0.5;0" dur="4s" begin="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" 
                        type="translate" 
                        values="0,0;-5,5;0,0" 
                        dur="5s" 
                        repeatCount="indefinite"/>
    </text>
    
    <text x="280" y="120" 
          font-family="'Fira Code', monospace" 
          font-size="14" 
          fill="rgba(147,51,234,0.4)"
          opacity="0">
      {}
      <animate attributeName="opacity" values="0;0.7;0" dur="5s" begin="0.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" 
                        type="translate" 
                        values="0,0;8,-8;0,0" 
                        dur="7s" 
                        repeatCount="indefinite"/>
    </text>
  </g>
</svg>