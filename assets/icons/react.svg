<!-- React Icon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="48" height="48">
  <defs>
    <linearGradient id="react-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#61DAFB"/>
      <stop offset="100%" style="stop-color:#21DFFF"/>
    </linearGradient>
    <filter id="glow-react">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- React atom structure -->
  <g transform="translate(32,32)" filter="url(#glow-react)">
    <!-- Electron orbits -->
    <ellipse cx="0" cy="0" rx="20" ry="8" fill="none" stroke="url(#react-gradient)" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" values="0;360" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="0" cy="0" rx="20" ry="8" fill="none" stroke="url(#react-gradient)" stroke-width="2" transform="rotate(60)">
      <animateTransform attributeName="transform" type="rotate" values="60;420" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="0" cy="0" rx="20" ry="8" fill="none" stroke="url(#react-gradient)" stroke-width="2" transform="rotate(120)">
      <animateTransform attributeName="transform" type="rotate" values="120;480" dur="3s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Central nucleus -->
    <circle cx="0" cy="0" r="4" fill="url(#react-gradient)">
      <animate attributeName="r" values="4;5;4" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>