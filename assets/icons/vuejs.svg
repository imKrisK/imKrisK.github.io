<!-- Vue.js Icon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="48" height="48">
  <defs>
    <linearGradient id="vue-gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC08D"/>
      <stop offset="100%" style="stop-color:#42B883"/>
    </linearGradient>
    <linearGradient id="vue-gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#35495E"/>
      <stop offset="100%" style="stop-color:#2C3E50"/>
    </linearGradient>
    <filter id="glow-vue">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Vue.js triangular logo -->
  <g filter="url(#glow-vue)">
    <polygon points="32,10 50,46 14,46" fill="url(#vue-gradient1)"/>
    <polygon points="32,18 42,38 22,38" fill="url(#vue-gradient2)"/>
    <!-- Animated core -->
    <circle cx="32" cy="32" r="2" fill="#42B883">
      <animate attributeName="r" values="2;3;2" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>