<!-- Node.js Icon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="48" height="48">
  <defs>
    <linearGradient id="node-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#68A063"/>
      <stop offset="100%" style="stop-color:#8CC84B"/>
    </linearGradient>
    <filter id="glow-node">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Node.js hexagon -->
  <polygon points="32,8 48,18 48,38 32,48 16,38 16,18" fill="url(#node-gradient)" filter="url(#glow-node)"/>
  <polygon points="32,12 44,19 44,37 32,44 20,37 20,19" fill="#689F5F" opacity="0.8"/>
  <!-- Node icon -->
  <circle cx="32" cy="28" r="6" fill="white" opacity="0.9"/>
  <path d="M32,20 L38,24 L38,32 L32,36 L26,32 L26,24 Z" fill="#68A063"/>
  <circle cx="32" cy="28" r="2" fill="white">
    <animate attributeName="r" values="2;3;2" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>