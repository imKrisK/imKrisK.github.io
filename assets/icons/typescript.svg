<!-- TypeScript Icon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="48" height="48">
  <defs>
    <linearGradient id="ts-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3178C6"/>
      <stop offset="100%" style="stop-color:#5BA7F7"/>
    </linearGradient>
    <filter id="glow-ts">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="8" y="8" width="48" height="48" rx="6" fill="url(#ts-gradient)" filter="url(#glow-ts)"/>
  <text x="32" y="40" text-anchor="middle" font-family="'Fira Code', monospace" font-size="20" fill="white" font-weight="bold">TS</text>
  <polygon points="45,15 50,12 55,15 50,18" fill="#FFD700" opacity="0.9">
    <animateTransform attributeName="transform" type="rotate" values="0 50 15;360 50 15" dur="4s" repeatCount="indefinite"/>
  </polygon>
</svg>