<!-- Git Icon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="48" height="48">
  <defs>
    <linearGradient id="git-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F05032"/>
      <stop offset="100%" style="stop-color:#E44C30"/>
    </linearGradient>
    <filter id="glow-git">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Git diamond shape -->
  <g transform="translate(32,32)" filter="url(#glow-git)">
    <polygon points="0,-24 24,0 0,24 -24,0" fill="url(#git-gradient)"/>
    <polygon points="0,-20 20,0 0,20 -20,0" fill="#FF6B4A" opacity="0.8"/>
    <!-- Git branches animation -->
    <circle cx="-8" cy="0" r="2" fill="white">
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="8" cy="0" r="2" fill="white">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <line x1="-8" y1="0" x2="8" y2="0" stroke="white" stroke-width="1" opacity="0.7"/>
  </g>
</svg>