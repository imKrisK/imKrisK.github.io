<!-- Docker Icon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="48" height="48">
  <defs>
    <linearGradient id="docker-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2496ED"/>
      <stop offset="100%" style="stop-color:#0DB7ED"/>
    </linearGradient>
    <filter id="glow-docker">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Docker whale -->
  <g filter="url(#glow-docker)">
    <!-- Whale body -->
    <ellipse cx="32" cy="40" rx="20" ry="12" fill="url(#docker-gradient)"/>
    <ellipse cx="32" cy="38" rx="18" ry="10" fill="#39B5E5" opacity="0.8"/>
    
    <!-- Container blocks -->
    <rect x="16" y="20" width="6" height="6" rx="1" fill="url(#docker-gradient)"/>
    <rect x="24" y="20" width="6" height="6" rx="1" fill="url(#docker-gradient)"/>
    <rect x="32" y="20" width="6" height="6" rx="1" fill="url(#docker-gradient)"/>
    <rect x="40" y="20" width="6" height="6" rx="1" fill="url(#docker-gradient)"/>
    
    <rect x="20" y="12" width="6" height="6" rx="1" fill="url(#docker-gradient)"/>
    <rect x="28" y="12" width="6" height="6" rx="1" fill="url(#docker-gradient)"/>
    <rect x="36" y="12" width="6" height="6" rx="1" fill="url(#docker-gradient)"/>
    
    <!-- Whale spout -->
    <path d="M32,32 Q28,28 24,30 Q20,32 18,28" stroke="#FFFFFF" stroke-width="2" fill="none" opacity="0.7">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>