<!-- Sass Icon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="48" height="48">
  <defs>
    <linearGradient id="sass-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CF649A"/>
      <stop offset="100%" style="stop-color:#CC6699"/>
    </linearGradient>
    <filter id="glow-sass">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Sass mustache logo -->
  <g filter="url(#glow-sass)">
    <circle cx="32" cy="32" r="24" fill="url(#sass-gradient)"/>
    <!-- Sass mustache -->
    <path d="M20,28 Q26,24 32,28 Q38,24 44,28 Q40,32 32,30 Q24,32 20,28 Z" fill="white" opacity="0.9"/>
    <circle cx="26" cy="26" r="2" fill="white"/>
    <circle cx="38" cy="26" r="2" fill="white"/>
    <!-- Animated sparkles -->
    <circle cx="18" cy="18" r="1" fill="white" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="46" cy="18" r="1" fill="white" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>