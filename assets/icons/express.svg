<!-- Express.js Icon -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="48" height="48">
  <defs>
    <linearGradient id="express-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000"/>
      <stop offset="100%" style="stop-color:#333333"/>
    </linearGradient>
    <filter id="glow-express">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Express.js fast symbol -->
  <g filter="url(#glow-express)">
    <rect x="8" y="8" width="48" height="48" rx="8" fill="url(#express-gradient)"/>
    <!-- Fast lines -->
    <path d="M16,20 L48,20" stroke="#FFD700" stroke-width="2" opacity="0.8">
      <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M16,32 L40,32" stroke="#FFD700" stroke-width="2" opacity="0.6">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M16,44 L44,44" stroke="#FFD700" stroke-width="2" opacity="0.7">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.8s" repeatCount="indefinite"/>
    </path>
    <!-- Express text -->
    <text x="32" y="38" text-anchor="middle" font-family="'Fira Code', monospace" font-size="10" fill="white" font-weight="bold">E</text>
  </g>
</svg>