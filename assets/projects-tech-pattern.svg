<!-- Projects Tech Pattern Background -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <!-- Subtle tech pattern -->
    <pattern id="tech-grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <g opacity="0.1">
        <!-- Grid dots -->
        <circle cx="30" cy="30" r="1" fill="rgba(59,130,246,0.3)"/>
        <circle cx="0" cy="0" r="0.5" fill="rgba(34,197,94,0.2)"/>
        <circle cx="60" cy="0" r="0.5" fill="rgba(147,51,234,0.2)"/>
        <circle cx="0" cy="60" r="0.5" fill="rgba(245,158,11,0.2)"/>
        <circle cx="60" cy="60" r="0.5" fill="rgba(239,68,68,0.2)"/>
        
        <!-- Connection lines -->
        <line x1="30" y1="30" x2="45" y2="15" stroke="rgba(59,130,246,0.1)" stroke-width="0.5"/>
        <line x1="30" y1="30" x2="15" y2="45" stroke="rgba(34,197,94,0.1)" stroke-width="0.5"/>
      </g>
    </pattern>
    
    <!-- Floating code symbols -->
    <g id="code-symbols" opacity="0.05">
      <text x="0" y="0" font-family="'Fira Code', monospace" font-size="24" fill="rgba(59,130,246,0.3)">&lt;/&gt;</text>
      <text x="100" y="50" font-family="'Fira Code', monospace" font-size="20" fill="rgba(34,197,94,0.3)">{ }</text>
      <text x="200" y="100" font-family="'Fira Code', monospace" font-size="18" fill="rgba(147,51,234,0.3)">=&gt;</text>
      <text x="300" y="150" font-family="'Fira Code', monospace" font-size="22" fill="rgba(245,158,11,0.3)">[ ]</text>
      <text x="400" y="200" font-family="'Fira Code', monospace" font-size="16" fill="rgba(239,68,68,0.3)">( )</text>
    </g>
  </defs>
  
  <!-- Base pattern -->
  <rect width="100%" height="100%" fill="url(#tech-grid)"/>
  
  <!-- Floating elements -->
  <use href="#code-symbols" x="50" y="50">
    <animateTransform attributeName="transform" type="translate" values="0,0;30,-10;0,0" dur="15s" repeatCount="indefinite"/>
  </use>
  <use href="#code-symbols" x="300" y="200">
    <animateTransform attributeName="transform" type="translate" values="0,0;-20,15;0,0" dur="18s" repeatCount="indefinite"/>
  </use>
  <use href="#code-symbols" x="600" y="100">
    <animateTransform attributeName="transform" type="translate" values="0,0;15,-20;0,0" dur="12s" repeatCount="indefinite"/>
  </use>
  <use href="#code-symbols" x="900" y="300">
    <animateTransform attributeName="transform" type="translate" values="0,0;-10,25;0,0" dur="20s" repeatCount="indefinite"/>
  </use>
  
  <!-- Subtle data lines -->
  <g opacity="0.08">
    <path d="M0,150 Q200,100 400,150 T800,150" stroke="rgba(59,130,246,0.3)" stroke-width="1" fill="none">
      <animate attributeName="opacity" values="0.08;0.15;0.08" dur="8s" repeatCount="indefinite"/>
    </path>
    <path d="M0,300 Q300,250 600,300 T1200,300" stroke="rgba(34,197,94,0.3)" stroke-width="1" fill="none">
      <animate attributeName="opacity" values="0.08;0.15;0.08" dur="10s" repeatCount="indefinite"/>
    </path>
    <path d="M0,450 Q250,400 500,450 T1000,450" stroke="rgba(147,51,234,0.3)" stroke-width="1" fill="none">
      <animate attributeName="opacity" values="0.08;0.15;0.08" dur="12s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>